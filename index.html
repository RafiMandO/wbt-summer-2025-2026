<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab3Task</title>
</head>
<body>
    <h1>Registration form</h1>
    <form action="# " method="post">
        <fieldset>
            <legend>
                Personal Information
            </legend>
            <label for="frame ">Full Name : </label>
            <input type="ID" name="Fname" id="Fname" required>
            <br> <br>

           
            <label for="frame ">Student id : </label>
            <input type="ID" name="Lname" id="Lname" required>
            <br><br>

            <label for="frame ">Email : </label>
            <input type="ID" name="email" id="email" required>
            <br><br>

            <label for="dob ">Date Of Birth : </label>
            <input type="date" name="dob" id="dob" required>
            <br><br>

            <label for="phone ">Phone Number : </label>
            <input type="tel" name="phone" id="phone" required>
            <br><br>

            <label for="Gender">Gender :</label>
            <input type="radio"id="male "name="gender"value="male">
            <label for="male">Male</label>
            <input type="radio"id="female "name="gender"value="female">
            <label for="male">Female</label>
            <input type="radio"id="other "name="gender"value="other">
            <label for="male">Other</label>


        </fieldset>

        <fieldset>
             <legend>
                Academic Information
            </legend>
            <label for="department">Department </label>
            <select name="department" id="department">
                <option value="CSE" selected>CSE</option>
                <option value="EEE">EEE</option>
                <option value="BBA">BBA</option>
                <option value="English">English</option>
                <option value="Civil Engineering">Civil Engineering</option>

         </select>
         <br><br>

         <label for="Semester">Semester</label>
         <select name="semester" id="semester">
            <option value="1st" selected>1st Semester</option>
                <option value="second">2nd Semester</option>
                <option value="thrid">3rd Semester</option>
                <option value="four">4th Semester</option>
                <option value="five">5th Semester</option>
                <option value="six">6th Semester</option>
                <option value="seven">7th Semester</option>
                <option value="eight">8th Semester</option>

         </select>
         <br>
         <br>


<label for="Skills">Skills</label><br>
<input type="checkbox"id="c"name="language"value="c">
    <label for="c">C</label>
        <br>
        <input type="checkbox"id="c++"name="language"value="c++">
    <label for="c++">C++</label>
        <br>
        <input type="checkbox"id="java"name="language"value="java">
    <label for="java">JAVA</label>
        <br>
        <input type="checkbox"id="python"name="language"value="python">
    <label for="python">PYTHON</label>
        <br>
             <input type="checkbox"id="javascript"name="language"value="javascript">
    <label for="javascript">JAVASCRIPT</label>
        <br>
             

        </fieldset>

        <fieldset>
            <legend>Additional Information</legend>
            <label for="Address">Address</label>
            <textarea name="address" id="address" cols="40" rows="4"></textarea>
            <br><br>
            upload your image : <input type="file" name="image" id="image">
            <br><br> 
            Comments : <br>
            <textarea name="comments" id="comments" cols="30" rows="10"></textarea>
             <br><br> 
                <input type="submit" value="Submit">        
                <input type="reset" value="Reset">  


        </fieldset>

    </form>
</body>
</html>
